<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WUV Fleet Portal</title>
<link rel="icon" href="https://media.base44.com/images/public/69ce859e3045380652888101/c0440fa9a_TheArkofDreams44.png"/>
<style>
:root{--bg:#0d0d0f;--surface:#161618;--surface2:#1e1e22;--border:#2a2a30;--text:#f0f0f5;--muted:#888;--teal:#00e5c8;--pink:#ff3c8e;--yellow:#ffd600;--red:#ff4444;--green:#00c97a;--blue:#3d9fff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;min-height:100vh;}
button{cursor:pointer;border:none;font-size:13px;font-family:inherit;}
input{font-family:inherit;}

/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:380px;}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo img{width:56px;height:56px;border-radius:12px;margin-bottom:12px;}
.login-logo h1{font-size:22px;font-weight:700;}
.login-logo p{color:var(--muted);font-size:13px;margin-top:4px;}
.form-group{margin-bottom:16px;}
label{display:block;margin-bottom:6px;color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;}
input[type=email],input[type=password]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;}
input:focus{border-color:var(--teal);}
.btn{padding:12px 20px;border-radius:10px;font-weight:700;width:100%;cursor:pointer;border:none;font-size:14px;}
.btn-teal{background:var(--teal);color:#000;}
.btn:hover{opacity:.88;}
.error-msg{color:var(--red);font-size:13px;text-align:center;margin-top:12px;}

/* App */
#app-screen{display:none;flex-direction:column;min-height:100vh;}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.header-logo{display:flex;align-items:center;gap:10px;}
.header-logo img{width:28px;height:28px;border-radius:6px;}
.header-logo span{font-weight:700;font-size:15px;}
.header-org{color:var(--teal);font-size:13px;}
.logout-btn{background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;}

#content{max-width:1100px;margin:0 auto;padding:32px 24px;width:100%;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;}
.stat-label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;}
.c-teal{color:var(--teal);}.c-green{color:var(--green);}.c-red{color:var(--red);}.c-yellow{color:var(--yellow);}

.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-weight:600;font-size:15px;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:10px 16px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);}
td{padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.dot-green{background:var(--green);}.dot-red{background:var(--red);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-teal{background:#00e5c822;color:var(--teal);}
.badge-yellow{background:#ffd60022;color:var(--yellow);}

.fk-section{background:var(--surface2);border-radius:10px;padding:16px;margin-top:12px;}
.fk-label{color:var(--muted);font-size:12px;margin-bottom:8px;font-weight:600;text-transform:uppercase;}
.fk-value{font-family:monospace;font-size:13px;color:var(--teal);word-break:break-all;}
.copy-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:12px;margin-left:8px;cursor:pointer;}

.empty{text-align:center;padding:40px;color:var(--muted);}
#toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;color:var(--teal);}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="https://media.base44.com/images/public/69ce859e3045380652888101/c0440fa9a_TheArkofDreams44.png"/>
      <h1>WUV Fleet Portal</h1>
      <p>Sign in to manage your devices</p>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="admin@yourschool.edu" autocomplete="email"/></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn btn-teal" onclick="login()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app-screen">
  <div id="header">
    <div class="header-logo">
      <img src="https://media.base44.com/images/public/69ce859e3045380652888101/c0440fa9a_TheArkofDreams44.png"/>
      <div>
        <span>WUV Fleet Portal</span><br/>
        <span class="header-org" id="header-org-name"></span>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign Out</button>
  </div>

  <div id="content">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total Devices</div><div class="stat-value c-teal" id="fs-total">—</div></div>
      <div class="stat"><div class="stat-label">Online</div><div class="stat-value c-green" id="fs-online">—</div></div>
      <div class="stat"><div class="stat-label">Offline</div><div class="stat-value c-red" id="fs-offline">—</div></div>
      <div class="stat"><div class="stat-label">Need Update</div><div class="stat-value c-yellow" id="fs-update">—</div></div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Your Devices</span>
        <button class="btn" style="background:var(--surface2);border:1px solid var(--border);padding:6px 14px;border-radius:8px;" onclick="loadFleet()">⟳ Refresh</button>
      </div>
      <table><thead><tr><th>Status</th><th>Hostname</th><th>Version</th><th>IP Address</th><th>Last Seen</th></tr></thead>
      <tbody id="fleet-table"></tbody></table>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Fleet Keys</span></div>
      <div style="padding:16px;" id="fleet-keys-list"></div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">License</span></div>
      <div style="padding:16px;" id="license-info"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let authToken = localStorage.getItem('wuv_fleet_token');
let orgData   = null;
let latestVer = null;

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function timeSince(ts) {
  if (!ts) return '—';
  const d = (Date.now() - new Date(ts)) / 1000;
  if (d < 60) return Math.round(d) + 's ago';
  if (d < 3600) return Math.round(d/60) + 'm ago';
  if (d < 86400) return Math.round(d/3600) + 'h ago';
  return Math.round(d/86400) + 'd ago';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  document.getElementById('login-error').textContent = '';
  try {
    const res = await fetch('/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email,password:pass})
    });
    const data = await res.json();
    if (data.token) {
      authToken = data.token;
      localStorage.setItem('wuv_fleet_token', authToken);
      localStorage.setItem('wuv_fleet_user', JSON.stringify(data.user));
      showApp(data.user);
    } else {
      document.getElementById('login-error').textContent = data.error || 'Login failed';
    }
  } catch(e) {
    document.getElementById('login-error').textContent = 'Connection error';
  }
}

function logout() {
  localStorage.removeItem('wuv_fleet_token');
  localStorage.removeItem('wuv_fleet_user');
  authToken = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

async function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('header-org-name').textContent = user.org_name;
  await loadFleet();
}

async function loadFleet() {
  try {
    const user = JSON.parse(localStorage.getItem('wuv_fleet_user')||'{}');
    const [orgRes, otaRes] = await Promise.all([
      fetch('/api/orgs/'+user.org_id, {headers:{Authorization:'Bearer '+authToken}}),
      fetch('/api/ota/current', {headers:{Authorization:'Bearer '+authToken}})
    ]);
    orgData   = await orgRes.json();
    const ota = await otaRes.json();
    latestVer = ota.version || null;
    renderFleet();
  } catch(e) { console.error(e); }
}

function renderFleet() {
  const devices = orgData.devices || [];
  const online  = devices.filter(d=>d.status!=='offline').length;
  const needUpd = latestVer ? devices.filter(d=>d.version&&d.version!==latestVer).length : 0;

  document.getElementById('fs-total').textContent  = devices.length;
  document.getElementById('fs-online').textContent = online;
  document.getElementById('fs-offline').textContent= devices.length - online;
  document.getElementById('fs-update').textContent = needUpd;

  const tbody = document.getElementById('fleet-table');
  if (!devices.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No devices registered yet. Boot a WUV OS device to get started.</td></tr>';
  } else {
    tbody.innerHTML = devices.map(d=>`<tr>
      <td><span class="dot dot-${d.status==='offline'?'red':'green'}"></span>${d.status}</td>
      <td><strong>${d.hostname||'—'}</strong></td>
      <td><span class="badge badge-${d.version===latestVer?'teal':'yellow'}">${d.version||'—'}</span></td>
      <td style="color:var(--muted);font-size:12px">${d.ip_address||'—'}</td>
      <td style="color:var(--muted)">${timeSince(d.last_seen)}</td>
    </tr>`).join('');
  }

  // Fleet keys
  const fkList = document.getElementById('fleet-keys-list');
  fkList.innerHTML = (orgData.fleet_keys||[]).map(k=>`
    <div class="fk-section">
      <div class="fk-label">${k.label||'Fleet Key'}</div>
      <div class="fk-value">${k.key_value}<button class="copy-btn" onclick="copyKey('${k.key_value}')">Copy</button></div>
    </div>
  `).join('') || '<div class="empty">No fleet keys</div>';

  // License
  const licInfo = document.getElementById('license-info');
  const lic = (orgData.licenses||[])[0];
  if (lic) {
    licInfo.innerHTML = `
      <div style="display:flex;gap:32px;flex-wrap:wrap;">
        <div><div class="fk-label">Tier</div><div style="font-size:18px;font-weight:700;color:var(--teal);text-transform:capitalize">${lic.tier}</div></div>
        <div><div class="fk-label">Device Limit</div><div style="font-size:18px;font-weight:700">${devices.length} / ${lic.device_limit}</div></div>
        <div><div class="fk-label">Status</div><div style="font-size:18px;font-weight:700;color:var(--green)">${lic.status}</div></div>
        <div><div class="fk-label">Expires</div><div style="font-size:18px;font-weight:700">${lic.expires_at?new Date(lic.expires_at).toLocaleDateString():'Never'}</div></div>
      </div>`;
  } else {
    licInfo.innerHTML = '<div class="empty">No license on file</div>';
  }
}

function copyKey(key) {
  navigator.clipboard.writeText(key);
  toast('Fleet key copied!');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-pass').addEventListener('keypress', e => { if(e.key==='Enter') login(); });
  if (authToken) {
    const user = JSON.parse(localStorage.getItem('wuv_fleet_user')||'{}');
    if (user.org_id) showApp(user);
  }
});
</script>
</body>
</html>
