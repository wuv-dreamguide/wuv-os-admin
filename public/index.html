<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WUV Admin — Fleet Console</title>
  <link rel="icon" type="image/png" href="https://media.base44.com/images/public/69ce859e3045380652888101/c0440fa9a_TheArkofDreams44.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0f;
      --surface:  #13131a;
      --border:   #1e1e2e;
      --accent:   #00d4b8;
      --accent2:  #ff6eb4;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --online:   #22c55e;
      --offline:  #ef4444;
      --warn:     #f59e0b;
    }

    html, body { height: 100%; font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Login ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center; height: 100vh;
      background: radial-gradient(ellipse at center, #0d1117 0%, #0a0a0f 100%);
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 48px 40px; width: 380px; text-align: center;
    }
    .login-card img { width: 64px; margin-bottom: 16px; }
    .login-card h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .login-card p { color: var(--muted); font-size: .875rem; margin-bottom: 28px; }
    .login-card input {
      width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .9rem; outline: none;
      transition: border-color .2s;
    }
    .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      margin-top: 16px; width: 100%; padding: 12px; background: var(--accent); color: #0a0a0f;
      border: none; border-radius: 8px; font-weight: 700; font-size: .95rem; cursor: pointer;
      transition: opacity .2s;
    }
    .login-card button:hover { opacity: .85; }
    #login-error { color: var(--accent2); font-size: .8rem; margin-top: 10px; }

    /* ── Shell ── */
    #app { display: none; height: 100vh; flex-direction: column; }

    header {
      display: flex; align-items: center; padding: 0 24px; height: 60px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      gap: 16px; flex-shrink: 0;
    }
    header img { width: 32px; }
    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: .04em; }
    header span { font-size: .75rem; color: var(--muted); }
    .spacer { flex: 1; }
    #ota-badge {
      display: none; background: var(--accent); color: #0a0a0f;
      padding: 4px 12px; border-radius: 20px; font-size: .75rem; font-weight: 700;
    }
    #logout-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: .8rem;
      transition: border-color .2s;
    }
    #logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Nav ── */
    nav {
      display: flex; gap: 4px; padding: 0 24px;
      background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    nav button {
      background: transparent; border: none; color: var(--muted); padding: 12px 16px;
      cursor: pointer; font-size: .875rem; border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    nav button:hover { color: var(--text); }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Main ── */
    main { flex: 1; overflow-y: auto; padding: 24px; }

    .page { display: none; }
    .page.active { display: block; }

    /* ── Cards / stats ── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 24px;
    }
    .stat-card .label { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 700; }
    .stat-card .value.online  { color: var(--online); }
    .stat-card .value.offline { color: var(--offline); }
    .stat-card .value.accent  { color: var(--accent); }

    /* ── Table ── */
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th { padding: 12px 16px; text-align: left; font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.online  { background: var(--online); box-shadow: 0 0 6px var(--online); }
    .dot.offline { background: var(--offline); }
    .dot.quarantine { background: var(--warn); }

    .mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: .8rem; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .75rem; font-weight: 600; }
    .tag.version { background: rgba(0,212,184,.12); color: var(--accent); }
    .tag.outdated { background: rgba(245,158,11,.12); color: var(--warn); }

    .btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: .8rem; font-weight: 600; transition: opacity .2s; }
    .btn:hover { opacity: .8; }
    .btn-primary { background: var(--accent); color: #0a0a0f; }
    .btn-danger  { background: rgba(239,68,68,.15); color: var(--offline); border: 1px solid rgba(239,68,68,.3); }
    .btn-ghost   { background: rgba(255,255,255,.05); color: var(--text); }

    /* ── OTA page ── */
    .ota-current {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; margin-bottom: 24px; display: flex; align-items: center; gap: 24px;
    }
    .ota-current .ver { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
    .ota-current .meta { color: var(--muted); font-size: .85rem; line-height: 1.8; }

    .promote-form {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px;
    }
    .promote-form h3 { margin-bottom: 16px; font-size: 1rem; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .form-row input {
      flex: 1; min-width: 160px; padding: 10px 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: .875rem; outline: none; transition: border-color .2s;
    }
    .form-row input:focus { border-color: var(--accent); }
    .form-row input::placeholder { color: var(--muted); }

    /* ── Node detail panel ── */
    #detail-panel {
      position: fixed; top: 0; right: -480px; width: 480px; height: 100vh;
      background: var(--surface); border-left: 1px solid var(--border);
      transition: right .3s ease; z-index: 100; display: flex; flex-direction: column;
    }
    #detail-panel.open { right: 0; }
    .panel-header {
      display: flex; align-items: center; padding: 20px 24px;
      border-bottom: 1px solid var(--border); gap: 12px;
    }
    .panel-header h2 { flex: 1; font-size: 1rem; }
    .panel-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
    .panel-section { margin-bottom: 24px; }
    .panel-section h3 { font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }
    .kv { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
    .kv:last-child { border-bottom: none; }
    .kv .k { color: var(--muted); }
    .hb-row { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .8rem; color: var(--muted); }
    .hb-row span { color: var(--text); margin-right: 8px; }
    .notes-area {
      width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: .875rem; resize: vertical;
      min-height: 80px; outline: none;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--surface);
      border: 1px solid var(--accent); border-radius: 8px; padding: 12px 20px;
      font-size: .875rem; opacity: 0; pointer-events: none;
      transition: opacity .3s; z-index: 200;
    }
    #toast.show { opacity: 1; }

    /* ── Loader ── */
    .loader { color: var(--muted); text-align: center; padding: 48px; }

    @media (max-width: 600px) {
      main { padding: 16px; }
      #detail-panel { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <img src="https://media.base44.com/images/public/69ce859e3045380652888101/c0440fa9a_TheArkofDreams44.png" alt="WUV" />
    <h1>WUV Fleet Console</h1>
    <p>Sign in to manage your node fleet</p>
    <input type="password" id="token-input" placeholder="Admin token" autocomplete="current-password" />
    <button id="login-btn">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- App Shell -->
<div id="app">
  <header>
    <img src="https://media.base44.com/images/public/69ce859e3045380652888101/c0440fa9a_TheArkofDreams44.png" alt="WUV" />
    <h1>WUV Fleet Console</h1>
    <span id="header-version"></span>
    <div class="spacer"></div>
    <div id="ota-badge">OTA Ready</div>
    <button id="logout-btn">Sign Out</button>
  </header>
  <nav>
    <button class="active" data-page="fleet">Fleet</button>
    <button data-page="ota">OTA Versions</button>
  </nav>
  <main>
    <!-- Fleet page -->
    <div id="page-fleet" class="page active">
      <div class="stats-grid">
        <div class="stat-card"><div class="label">Total Nodes</div><div class="value accent" id="stat-total">—</div></div>
        <div class="stat-card"><div class="label">Online</div><div class="value online" id="stat-online">—</div></div>
        <div class="stat-card"><div class="label">Offline</div><div class="value offline" id="stat-offline">—</div></div>
        <div class="stat-card"><div class="label">Current Version</div><div class="value accent" id="stat-version">—</div></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Status</th>
              <th>Hostname</th>
              <th>Machine ID</th>
              <th>Version</th>
              <th>IP</th>
              <th>Last Seen</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="nodes-tbody"><tr><td colspan="7" class="loader">Loading fleet…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- OTA page -->
    <div id="page-ota" class="page">
      <div class="ota-current">
        <div>
          <div style="font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Live Version</div>
          <div class="ver" id="ota-current-ver">—</div>
        </div>
        <div class="meta" id="ota-current-meta"></div>
      </div>
      <div class="table-wrap" style="margin-bottom:24px">
        <table>
          <thead><tr><th>Filename</th><th>Size</th><th>Modified</th><th></th></tr></thead>
          <tbody id="ota-files-tbody"><tr><td colspan="4" class="loader">Loading…</td></tr></tbody>
        </table>
      </div>
      <div class="promote-form">
        <h3>Promote Version</h3>
        <div class="form-row">
          <input id="promo-version" placeholder="Version (e.g. 3.1.19)" />
          <input id="promo-sha256"  placeholder="SHA256 (optional)" />
          <input id="promo-url"     placeholder="ISO URL (auto-filled if blank)" />
        </div>
        <button class="btn btn-primary" id="promote-btn">Promote to Stable</button>
      </div>
    </div>
  </main>
</div>

<!-- Node detail panel -->
<div id="detail-panel">
  <div class="panel-header">
    <h2 id="panel-hostname">Node Detail</h2>
    <button class="panel-close" id="panel-close">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── State ────────────────────────────────────────────────────
  let adminToken = sessionStorage.getItem('wuv_token') || '';
  let currentVersion = null;
  let refreshTimer = null;

  // ── Helpers ──────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  function toast(msg, err = false) {
    const t = $('toast');
    t.textContent = msg;
    t.style.borderColor = err ? 'var(--accent2)' : 'var(--accent)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function fmtBytes(b) {
    if (!b) return '—';
    const gb = b / 1e9;
    return gb >= 1 ? `${gb.toFixed(2)} GB` : `${(b / 1e6).toFixed(0)} MB`;
  }

  function fmtRelative(isoStr) {
    const diff = Date.now() - new Date(isoStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1)   return 'just now';
    if (mins < 60)  return `${mins}m ago`;
    if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
    return `${Math.floor(mins/1440)}d ago`;
  }

  function statusDot(status) {
    return `<span class="dot ${status}"></span>${status}`;
  }

  async function api(path, opts = {}) {
    const res = await fetch(path, {
      headers: { 'x-admin-token': adminToken, 'Content-Type': 'application/json', ...(opts.headers||{}) },
      ...opts
    });
    if (res.status === 401) { doLogout(); return null; }
    return res.json();
  }

  // ── Auth ─────────────────────────────────────────────────────
  async function tryLogin() {
    const tok = $('token-input').value.trim();
    if (!tok) return;
    adminToken = tok;
    const data = await fetch('/api/nodes', { headers: { 'x-admin-token': tok } });
    if (data.status === 401) {
      $('login-error').textContent = 'Invalid token — try again.';
      adminToken = '';
      return;
    }
    sessionStorage.setItem('wuv_token', tok);
    showApp();
  }

  function doLogout() {
    adminToken = '';
    sessionStorage.removeItem('wuv_token');
    clearInterval(refreshTimer);
    $('app').style.display = 'none';
    $('login-screen').style.display = 'flex';
    $('token-input').value = '';
  }

  function showApp() {
    $('login-screen').style.display = 'none';
    $('app').style.display = 'flex';
    loadFleet();
    loadOTA();
    refreshTimer = setInterval(() => { loadFleet(); loadOTA(); }, 30000);
  }

  // ── Fleet ─────────────────────────────────────────────────────
  async function loadFleet() {
    const data = await api('/api/nodes');
    if (!data) return;
    const { nodes } = data;

    const online  = nodes.filter(n => n.status === 'active').length;
    const offline = nodes.filter(n => n.status === 'offline').length;
    $('stat-total').textContent   = nodes.length;
    $('stat-online').textContent  = online;
    $('stat-offline').textContent = offline;

    const tbody = $('nodes-tbody');
    if (!nodes.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="loader">No nodes registered yet</td></tr>';
      return;
    }

    tbody.innerHTML = nodes.map(n => {
      const outdated = currentVersion && n.version !== currentVersion;
      const verTag = n.version
        ? `<span class="tag ${outdated ? 'outdated' : 'version'}">${n.version}${outdated ? ' ⚠' : ''}</span>`
        : '<span style="color:var(--muted)">—</span>';
      return `<tr>
        <td>${statusDot(n.status)}</td>
        <td><strong>${n.hostname || '—'}</strong></td>
        <td class="mono">${n.machine_id.substring(0,16)}…</td>
        <td>${verTag}</td>
        <td class="mono">${n.ip_address || '—'}</td>
        <td>${fmtRelative(n.last_seen)}</td>
        <td><button class="btn btn-ghost" onclick="openPanel('${n.id}')">Details</button></td>
      </tr>`;
    }).join('');
  }

  // ── OTA ──────────────────────────────────────────────────────
  async function loadOTA() {
    const [cur, vers] = await Promise.all([
      api('/api/ota/current'),
      api('/api/ota/versions'),
    ]);

    if (cur && !cur.error) {
      currentVersion = cur.version;
      $('ota-current-ver').textContent = cur.version;
      $('stat-version').textContent = cur.version;
      $('header-version').textContent = `v${cur.version}`;
      $('ota-current-meta').innerHTML =
        `Channel: ${cur.channel}<br>` +
        `Size: ${fmtBytes(cur.size)}<br>` +
        `Built: ${cur.build_date ? new Date(cur.build_date).toLocaleDateString() : '—'}<br>` +
        `<span class="mono" style="font-size:.75rem;color:var(--muted)">${cur.sha256 ? cur.sha256.substring(0,32)+'…' : 'No SHA256'}</span>`;
    }

    if (vers && vers.versions) {
      const tbody = $('ota-files-tbody');
      if (!vers.versions.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="loader">No ISOs found</td></tr>';
      } else {
        tbody.innerHTML = vers.versions.map(f => {
          const isCurrent = f.filename.includes(currentVersion || '___');
          return `<tr>
            <td class="mono">${f.filename}${isCurrent ? ' <span class="tag version">current</span>' : ''}</td>
            <td>${fmtBytes(f.size)}</td>
            <td>${new Date(f.modified).toLocaleDateString()}</td>
            <td>
              <button class="btn btn-ghost" onclick="fillPromote('${f.filename}')">Use</button>
            </td>
          </tr>`;
        }).join('');
      }
    }
  }

  function fillPromote(filename) {
    const match = filename.match(/wuvos-(\d+\.\d+\.\d+)-/);
    if (match) $('promo-version').value = match[1];
    $('promo-url').value = `https://update.wuv.cloud/iso/${filename}`;
    switchPage('ota');
    $('promote-btn').scrollIntoView({ behavior: 'smooth' });
  }

  $('promote-btn').addEventListener('click', async () => {
    const version = $('promo-version').value.trim();
    const sha256  = $('promo-sha256').value.trim();
    const url     = $('promo-url').value.trim();
    if (!version) { toast('Version is required', true); return; }

    const data = await api('/api/ota/promote', {
      method: 'POST',
      body: JSON.stringify({ version, sha256: sha256 || undefined, url: url || undefined }),
    });
    if (data?.ok) {
      toast(`v${version} promoted to stable ✓`);
      loadOTA();
      loadFleet();
    } else {
      toast(data?.error || 'Promote failed', true);
    }
  });

  // ── Node detail panel ─────────────────────────────────────────
  async function openPanel(id) {
    const data = await api(`/api/nodes/${id}`);
    if (!data) return;
    const { node, heartbeats } = data;

    $('panel-hostname').textContent = node.hostname || node.machine_id;

    $('panel-body').innerHTML = `
      <div class="panel-section">
        <h3>Identity</h3>
        <div class="kv"><span class="k">Machine ID</span><span class="mono">${node.machine_id}</span></div>
        <div class="kv"><span class="k">Hostname</span><span>${node.hostname || '—'}</span></div>
        <div class="kv"><span class="k">IP Address</span><span class="mono">${node.ip_address || '—'}</span></div>
        <div class="kv"><span class="k">Version</span><span>${node.version || '—'}</span></div>
        <div class="kv"><span class="k">Status</span><span>${statusDot(node.status)}</span></div>
        <div class="kv"><span class="k">First Seen</span><span>${new Date(node.first_seen).toLocaleString()}</span></div>
        <div class="kv"><span class="k">Last Seen</span><span>${fmtRelative(node.last_seen)}</span></div>
      </div>
      <div class="panel-section">
        <h3>Notes</h3>
        <textarea class="notes-area" id="panel-notes" placeholder="Add notes about this node…">${node.notes || ''}</textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-primary" onclick="saveNotes('${node.id}')">Save</button>
          <button class="btn btn-danger"  onclick="removeNode('${node.id}', '${node.hostname || node.machine_id}')">Remove Node</button>
        </div>
      </div>
      <div class="panel-section">
        <h3>Recent Heartbeats (last ${heartbeats.length})</h3>
        ${heartbeats.length ? heartbeats.map(h => `
          <div class="hb-row">
            <span>${new Date(h.received_at).toLocaleString()}</span>
            v${h.version || '?'} · ${h.ip_address || '?'}
          </div>`).join('') : '<div class="loader" style="padding:16px">No heartbeats recorded</div>'}
      </div>
    `;

    $('detail-panel').classList.add('open');
  }

  async function saveNotes(id) {
    const notes = $('panel-notes').value;
    const data = await api(`/api/nodes/${id}`, { method: 'PUT', body: JSON.stringify({ notes }) });
    if (data?.ok) toast('Notes saved ✓');
  }

  async function removeNode(id, name) {
    if (!confirm(`Remove node "${name}" from the fleet registry?`)) return;
    const data = await api(`/api/nodes/${id}`, { method: 'DELETE' });
    if (data?.ok) {
      toast(`Node removed`);
      $('detail-panel').classList.remove('open');
      loadFleet();
    }
  }

  $('panel-close').addEventListener('click', () => $('detail-panel').classList.remove('open'));

  // ── Nav ──────────────────────────────────────────────────────
  function switchPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    $(`page-${name}`).classList.add('active');
    document.querySelector(`nav button[data-page="${name}"]`).classList.add('active');
  }

  document.querySelectorAll('nav button').forEach(btn => {
    btn.addEventListener('click', () => switchPage(btn.dataset.page));
  });

  // ── Boot ─────────────────────────────────────────────────────
  $('login-btn').addEventListener('click', tryLogin);
  $('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  $('logout-btn').addEventListener('click', doLogout);

  if (adminToken) showApp();
